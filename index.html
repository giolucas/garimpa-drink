<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Garimpa Drink — Bares SP</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23BA1971'/%3E%3Crect x='17' y='17' width='30' height='30' fill='%23ffffff'/%3E%3Ccircle cx='32' cy='32' r='13' fill='%232D5DF0'/%3E%3Cpath d='M21 34a11 11 0 0 1 22 0z' fill='%23f0a93c'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --magenta: #BA1971;
    --pink: #E27CA8;
    --blue: #2D5DF0;
    --indigo: #241A8C;
    --rust: #9C4A1E;
    --bg: #15101a;
    --card: #1f1722;
    --accent: var(--pink);
    --text: #f5eef2;
    --muted: #ab93a5;
    --green: #5fae6e;
    --red: #c98a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
  }
  header {
    padding: 20px 16px 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid #2e2430;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .logo-mark {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--magenta);
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-mark .sq {
    position: absolute;
    width: 19px;
    height: 19px;
    background: #fff;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .logo-mark .ci {
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--blue);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .logo-mark .ha {
    position: absolute;
    width: 11px;
    height: 5.5px;
    border-radius: 11px 11px 0 0;
    background: #f0a93c;
    top: 56%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  h1 {
    font-size: 20px;
    margin: 0;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .subtitle a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .subtitle .age-notice {
    display: block;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #3a2e38;
    background: #1f1722;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-top: 10px;
    padding-bottom: 4px;
  }
  .filters select {
    flex: 1;
    min-width: 110px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #3a2e38;
    background: #1f1722;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
  }
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px 6px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid #3a2e38;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    background: #1f1722;
  }
  .toggle-btn.active {
    border-color: var(--magenta);
    color: #fff;
    background: var(--magenta);
  }
  .heart-btn {
    appearance: none;
    border: none;
    background: none;
    font-size: 19px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    color: #4a3f47;
    flex-shrink: 0;
    transition: transform 0.15s ease;
  }
  .heart-btn.fav { color: var(--magenta); }
  .heart-btn:active { transform: scale(1.25); }
  .bookmark-btn {
    appearance: none;
    border: none;
    background: none;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    color: #4a3f47;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    transition: transform 0.15s ease;
  }
  .bookmark-btn svg path { fill: none; transition: fill 0.15s ease; }
  .bookmark-btn.active { color: var(--blue); }
  .bookmark-btn.active svg path { fill: var(--blue); }
  .bookmark-btn:active { transform: scale(1.2); }
  .pin-btn {
    appearance: none;
    border: none;
    background: none;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    color: #4a3f47;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    transition: transform 0.15s ease;
  }
  .pin-btn.active { color: #e23b3b; }
  .pin-btn:active { transform: scale(1.2); }
  main {
    padding: 12px 16px;
  }
  .count {
    font-size: 12.5px;
    color: var(--muted);
    margin: 6px 2px 12px;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid #2e2430;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-top-right {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .bar-name {
    font-size: 16.5px;
    font-weight: 700;
  }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 700;
  }
  .badge.visited { background: rgba(45, 93, 240, 0.18); color: var(--blue); }
  .badge.notvisited { background: rgba(186, 25, 113, 0.16); color: var(--pink); }
  .meta {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
  }
  .meta span b { color: var(--text); font-weight: 500; }
  .estilo-pill {
    appearance: none;
    border: 1px solid rgba(255, 255, 255, 0.35);
    background: transparent;
    color: #fff;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12.5px;
    font-weight: 600;
    font-family: 'Open Sans', sans-serif;
    cursor: pointer;
  }
  .estilo-pill:active { transform: scale(0.96); }
  .ig-link {
    display: inline-flex;
    align-items: center;
    padding: 2px 4px;
    color: var(--accent);
    text-decoration: none;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 14px;
  }
  #gate {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  #gate.hidden { display: none; }
  .gate-box {
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .gate-box .logo-mark {
    margin: 0 auto 16px;
    width: 48px;
    height: 48px;
  }
  .gate-box .logo-mark .sq { width: 27px; height: 27px; }
  .gate-box .logo-mark .ci { width: 22px; height: 22px; }
  .gate-box .logo-mark .ha { width: 15px; height: 7.5px; }
  .gate-box h2 {
    font-size: 18px;
    margin: 0 0 6px;
  }
  .gate-box p {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 18px;
  }
  .gate-box input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #3a2e38;
    background: #1f1722;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 10px;
  }
  .gate-box input:focus { border-color: var(--accent); }
  .gate-box button {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    background: var(--magenta);
    color: #fff;
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .gate-error {
    color: var(--red);
    font-size: 12.5px;
    margin-top: 10px;
    min-height: 16px;
  }
</style>
</head>
<body>
<div id="gate">
  <div class="gate-box">
    <div class="logo-mark"><div class="sq"></div><div class="ci"></div><div class="ha"></div></div>
    <h2>Garimpa Drink</h2>
    <p>Acesso restrito. Digite a senha para entrar.</p>
    <form id="gateForm">
      <input type="password" id="gatePassword" placeholder="Senha" autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>
<header>
  <div class="brand">
    <div class="logo-mark"><div class="sq"></div><div class="ci"></div><div class="ha"></div></div>
    <h1>Garimpa Drink</h1>
  </div>
  <div class="subtitle">O básico para você beber além do básico em São Paulo.<br>Por Giovanni Lucas :) <a href="https://www.instagram.com/ehogiomesmo/" target="_blank" rel="noopener">@ehogiomesmo</a><span class="age-notice">Destinado para maiores de 18 anos.</span></div>
  <input type="text" id="search" placeholder="Pesquise por bar, bairro ou categoria.">
  <div class="filters">
    <select id="bairroFilter"><option value="">Todos os Bairros</option></select>
    <select id="estiloFilter"><option value="">Todas as Categorias</option></select>
  </div>
  <div class="toggle-row">
    <div class="toggle-btn active" data-val="all">Todos</div>
    <div class="toggle-btn" data-val="favorites">Favoritos</div>
    <div class="toggle-btn" data-val="visited">Visitados</div>
    <div class="toggle-btn" data-val="embreve">Ir em Breve</div>
  </div>
</header>
<main>
  <div class="count" id="count"></div>
  <div id="list"></div>
</main>

<script src="data.js"></script>
<script>
  const GATE_KEY = 'garimpa_acesso';
  const GATE_PASSWORD = 'penicilinbrasil';
  const gateEl = document.getElementById('gate');
  const gateForm = document.getElementById('gateForm');
  const gatePassword = document.getElementById('gatePassword');
  const gateError = document.getElementById('gateError');

  if (localStorage.getItem(GATE_KEY) === 'ok') {
    gateEl.classList.add('hidden');
  }

  gateForm.addEventListener('submit', (e) => {
    e.preventDefault();
    if (gatePassword.value === GATE_PASSWORD) {
      localStorage.setItem(GATE_KEY, 'ok');
      gateEl.classList.add('hidden');
      gateError.textContent = '';
    } else {
      gateError.textContent = 'Senha incorreta. Tente novamente.';
      gatePassword.value = '';
      gatePassword.focus();
    }
  });

  const searchInput = document.getElementById('search');
  const bairroFilter = document.getElementById('bairroFilter');
  const estiloFilter = document.getElementById('estiloFilter');
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const toggleBtns = document.querySelectorAll('.toggle-btn');
  let visitedMode = 'all';

  const data = BARES.filter(b => b.bar && b.bar.trim() !== '');
  data.forEach((b, i) => { b._id = i; });

  const FAV_KEY = 'garimpa_favoritos';
  let favoritos = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));

  function saveFavoritos() {
    localStorage.setItem(FAV_KEY, JSON.stringify([...favoritos]));
  }

  function toggleFavorito(id) {
    if (favoritos.has(id)) favoritos.delete(id);
    else favoritos.add(id);
    saveFavoritos();
    render();
  }

  const EMBREVE_KEY = 'garimpa_embreve';
  const embreveStored = localStorage.getItem(EMBREVE_KEY);
  let embreve = new Set(embreveStored ? JSON.parse(embreveStored) : []);

  function saveEmbreve() {
    localStorage.setItem(EMBREVE_KEY, JSON.stringify([...embreve]));
  }

  function toggleEmbreve(id) {
    if (embreve.has(id)) embreve.delete(id);
    else embreve.add(id);
    saveEmbreve();
    render();
  }

  const VISITED_KEY = 'garimpa_visitados_v2';
  const visitedStored = localStorage.getItem(VISITED_KEY);
  let visitados = new Set(visitedStored ? JSON.parse(visitedStored) : []);

  function saveVisitados() {
    localStorage.setItem(VISITED_KEY, JSON.stringify([...visitados]));
  }

  function toggleVisitado(id) {
    if (visitados.has(id)) visitados.delete(id);
    else visitados.add(id);
    saveVisitados();
    render();
  }

  const bookmarkIconPath = 'M7 4h10a1 1 0 0 1 1 1v15l-6-4.5L6 20V5a1 1 0 0 1 1-1z';
  const pinIconSvg = `<svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z" fill="currentColor"/><circle cx="12" cy="9" r="2.7" fill="#fff"/></svg>`;

  const igIconSvg = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg>`;

  function uniqueSorted(field) {
    return [...new Set(data.map(b => b[field]).filter(v => v && v.trim() !== ''))].sort((a, b) => a.localeCompare(b, 'pt-BR'));
  }

  uniqueSorted('bairro').forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    bairroFilter.appendChild(opt);
  });
  uniqueSorted('estilo').forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    estiloFilter.appendChild(opt);
  });

  function normalize(s) {
    return (s || '').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  function render() {
    const q = normalize(searchInput.value.trim());
    const bairro = bairroFilter.value;
    const estilo = estiloFilter.value;

    const filtered = data.filter(b => {
      if (visitedMode === 'visited' && !visitados.has(b._id)) return false;
      if (visitedMode === 'embreve' && !embreve.has(b._id)) return false;
      if (visitedMode === 'favorites' && !favoritos.has(b._id)) return false;
      if (bairro && b.bairro !== bairro) return false;
      if (estilo && b.estilo !== estilo) return false;
      if (q) {
        const haystack = normalize(`${b.bar} ${b.instagram} ${b.bairro} ${b.estilo}`);
        if (!haystack.includes(q)) return false;
      }
      return true;
    });

    let labelExtra;
    if (visitedMode === 'favorites') labelExtra = ` — ♥ ${favoritos.size} favorito(s)`;
    else if (visitedMode === 'visited') labelExtra = ` — visitados: ${visitados.size} de ${data.length}`;
    else if (visitedMode === 'embreve') labelExtra = ` — 🔖 ${embreve.size} ir em breve`;
    else labelExtra = ` — visitados: ${visitados.size} de ${data.length}`;
    countEl.textContent = `${filtered.length} resultado(s)${labelExtra}`;

    if (filtered.length === 0) {
      let emptyMsg = 'Nenhum bar encontrado 🙁';
      if (visitedMode === 'favorites') emptyMsg = 'Você ainda não favoritou nenhum bar. Toque no ♡ de um card para adicionar.';
      else if (visitedMode === 'visited') emptyMsg = 'Você ainda não marcou nenhum bar como visitado. Toque no pin de um card para marcar.';
      else if (visitedMode === 'embreve') emptyMsg = 'Você ainda não marcou nenhum bar como "ir em breve". Toque no 🔖 de um card para marcar.';
      listEl.innerHTML = `<div class="empty">${emptyMsg}</div>`;
      return;
    }

    listEl.innerHTML = filtered.map(b => `
      <div class="card">
        <div class="card-top">
          <div class="bar-name">${escapeHtml(b.bar)}</div>
          <div class="card-top-right">
            ${b.instagram ? `<a class="ig-link" href="${escapeHtml(b.instagram)}" target="_blank" rel="noopener" aria-label="Ver Instagram">${igIconSvg}</a>` : ''}
            <button class="pin-btn ${visitados.has(b._id) ? 'active' : ''}" data-id="${b._id}" data-action="visit" aria-label="Marcar como visitado">
              ${pinIconSvg}
            </button>
            <button class="bookmark-btn ${embreve.has(b._id) ? 'active' : ''}" data-id="${b._id}" data-action="embreve" aria-label="Marcar como ir em breve">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${bookmarkIconPath}"/></svg>
            </button>
            <button class="heart-btn ${favoritos.has(b._id) ? 'fav' : ''}" data-id="${b._id}" data-action="fav" aria-label="Favoritar">${favoritos.has(b._id) ? '♥' : '♡'}</button>
          </div>
        </div>
        <div class="meta">
          ${b.bairro ? `<button class="estilo-pill" data-action="bairro" data-bairro="${escapeHtml(b.bairro)}">${escapeHtml(b.bairro)}</button>` : ''}
          ${b.estilo ? `<button class="estilo-pill" data-action="estilo" data-estilo="${escapeHtml(b.estilo)}">${escapeHtml(b.estilo)}</button>` : ''}
        </div>
      </div>
    `).join('');

    listEl.querySelectorAll('[data-action="estilo"]').forEach(btn => {
      btn.addEventListener('click', () => {
        estiloFilter.value = btn.dataset.estilo;
        render();
      });
    });
    listEl.querySelectorAll('[data-action="bairro"]').forEach(btn => {
      btn.addEventListener('click', () => {
        bairroFilter.value = btn.dataset.bairro;
        render();
      });
    });
    listEl.querySelectorAll('[data-action="fav"]').forEach(btn => {
      btn.addEventListener('click', () => toggleFavorito(Number(btn.dataset.id)));
    });
    listEl.querySelectorAll('[data-action="embreve"]').forEach(btn => {
      btn.addEventListener('click', () => toggleEmbreve(Number(btn.dataset.id)));
    });
    listEl.querySelectorAll('[data-action="visit"]').forEach(btn => {
      btn.addEventListener('click', () => toggleVisitado(Number(btn.dataset.id)));
    });
  }

  function instagramHandle(url) {
    try {
      const path = new URL(url).pathname.replace(/^\/+|\/+$/g, '');
      return '@' + decodeURIComponent(path.split('/')[0]);
    } catch (e) {
      return url;
    }
  }

  function escapeHtml(s) {
    return (s || '').toString()
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  searchInput.addEventListener('input', render);
  bairroFilter.addEventListener('change', render);
  estiloFilter.addEventListener('change', render);
  toggleBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      toggleBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      visitedMode = btn.dataset.val;
      render();
    });
  });

  render();
</script>
</body>
</html>
